<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reCAPTCHA v3 Test Website</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    .score-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 52px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .score-header-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 4px;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      animation: fadeIn 0.3s ease;
    }

    .score-pill .action-name {
      color: #374151;
    }

    .score-pill .score-value {
      font-variant-numeric: tabular-nums;
    }

    .score-pill.green { border-color: #bbf7d0; background: #f0fdf4; }
    .score-pill.green .score-value { color: #16a34a; }

    .score-pill.yellow { border-color: #fef08a; background: #fefce8; }
    .score-pill.yellow .score-value { color: #ca8a04; }

    .score-pill.red { border-color: #fecaca; background: #fef2f2; }
    .score-pill.red .score-value { color: #dc2626; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 32px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card p.subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #4338ca;
    }

    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.875rem;
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    .score-header-empty {
      font-size: 0.8rem;
      color: #9ca3af;
      font-style: italic;
    }
  </style>
</head>
<body>
  <header class="score-header" data-test-id="score-header">
    <span class="score-header-label">Scores</span>
    <span class="score-header-empty" id="emptyLabel">Waiting for first check&hellip;</span>
    <div id="scorePills"></div>
  </header>

  <main class="main">
    <div id="consentScreen" class="screen active">
      <div class="card">
        <h1>Welcome</h1>
        <p class="subtitle">You are about to enter this website</p>
        <p class="error-msg hidden" id="consentError"></p>
        <button
          class="btn btn-primary"
          data-test-id="got-it-button"
          id="gotItBtn"
        >
          Got it
        </button>
      </div>
    </div>

    <div id="loginScreen" class="screen">
      <div class="card">
        <h1>Log in</h1>
        <p class="subtitle">Enter your credentials to continue</p>
        <p class="error-msg hidden" id="loginError"></p>
        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label for="nameInput">Name</label>
            <input
              type="text"
              id="nameInput"
              data-test-id="name-input"
              placeholder="Your name"
              required
            />
          </div>
          <div class="form-group">
            <label for="emailInput">Email</label>
            <input
              type="email"
              id="emailInput"
              data-test-id="email-input"
              placeholder="you@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="passwordInput">Password</label>
            <input
              type="password"
              id="passwordInput"
              data-test-id="password-input"
              placeholder="Password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            data-test-id="login-button"
            id="loginBtn"
          >
            Login
          </button>
        </form>
      </div>
    </div>
  </main>

  <script>
    let siteKey = null;

    function scoreColor(score) {
      if (score >= 0.7) return "green";
      if (score >= 0.3) return "yellow";
      return "red";
    }

    function addScorePill(action, score) {
      const emptyLabel = document.getElementById("emptyLabel");
      if (emptyLabel) emptyLabel.remove();

      const pill = document.createElement("span");
      pill.className = `score-pill ${scoreColor(score)}`;
      pill.innerHTML =
        `<span class="action-name">${action}</span>` +
        `<span class="score-value">${score.toFixed(1)}</span>`;
      document.getElementById("scorePills").appendChild(pill);
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    function clearError(id) {
      const el = document.getElementById(id);
      el.textContent = "";
      el.classList.add("hidden");
    }

    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");
    }

    async function executeAction(action) {
      const token = await grecaptcha.execute(siteKey, { action });
      const res = await fetch("/api/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Verification failed");
      addScorePill(data.action || action, data.score);
      return data;
    }

    async function onGotIt() {
      const btn = document.getElementById("gotItBtn");
      btn.disabled = true;
      btn.textContent = "Checking\u2026";
      clearError("consentError");

      try {
        await executeAction("consent");
        showScreen("loginScreen");
      } catch (err) {
        showError("consentError", err.message);
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = "Got it";
      }
    }

    async function onLogin(e) {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      btn.disabled = true;
      btn.textContent = "Checking\u2026";
      clearError("loginError");

      try {
        await executeAction("login");
        btn.textContent = "Done!";
      } catch (err) {
        showError("loginError", err.message);
        btn.disabled = false;
        btn.textContent = "Login";
        console.error(err);
      }
    }

    async function init() {
      try {
        const res = await fetch("/api/config");
        const data = await res.json();
        siteKey = data.siteKey;

        if (!siteKey) {
          showError("consentError", "Site key not configured on the server");
          return;
        }

        const script = document.createElement("script");
        script.src = `https://www.google.com/recaptcha/api.js?render=${siteKey}`;
        script.onload = () => {
          grecaptcha.ready(() => executeAction("homepage"));
        };
        document.head.appendChild(script);
      } catch (err) {
        showError("consentError", "Failed to load configuration");
        console.error(err);
      }
    }

    document.getElementById("gotItBtn").addEventListener("click", onGotIt);
    document.getElementById("loginForm").addEventListener("submit", onLogin);

    init();
  </script>
</body>
</html>
