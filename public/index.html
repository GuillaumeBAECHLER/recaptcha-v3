<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reCAPTCHA v3 Score Checker</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .score-ring {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 24px;
    }

    .score-ring svg {
      transform: rotate(-90deg);
    }

    .score-ring .bg {
      fill: none;
      stroke: #e5e7eb;
      stroke-width: 10;
    }

    .score-ring .fg {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 408;
      stroke-dashoffset: 408;
      transition: stroke-dashoffset 0.8s ease, stroke 0.4s ease;
    }

    .score-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .details {
      text-align: left;
      background: #f9fafb;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 0.875rem;
      line-height: 1.8;
      color: #374151;
    }

    .details span {
      float: right;
      font-weight: 600;
      color: #111827;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #4338ca;
    }

    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.875rem;
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>reCAPTCHA v3 Score</h1>
    <p class="subtitle">See how Google rates this browser session</p>

    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle class="bg" cx="80" cy="80" r="65" />
        <circle class="fg" id="ring" cx="80" cy="80" r="65" />
      </svg>
      <div class="score-value" id="scoreValue">—</div>
    </div>

    <div class="details hidden" id="details">
      <div>Action <span id="detailAction">—</span></div>
      <div>Success <span id="detailSuccess">—</span></div>
      <div>Timestamp <span id="detailTs">—</span></div>
    </div>

    <p class="error-msg hidden" id="error"></p>

    <button class="btn" id="refreshBtn" disabled>
      <span class="spinner" id="spinner"></span>
      Checking…
    </button>
  </div>

  <script src="https://www.google.com/recaptcha/api.js?render=YOUR_RECAPTCHA_SITE_KEY"></script>
  <script>
    const SITE_KEY = "YOUR_RECAPTCHA_SITE_KEY";
    const CIRCUMFERENCE = 2 * Math.PI * 65; // matches r=65 on the SVG circle

    const ring = document.getElementById("ring");
    const scoreValue = document.getElementById("scoreValue");
    const details = document.getElementById("details");
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("refreshBtn");
    const spinner = document.getElementById("spinner");

    function setScore(score) {
      const offset = CIRCUMFERENCE * (1 - score);
      ring.style.strokeDasharray = CIRCUMFERENCE;
      ring.style.strokeDashoffset = offset;

      let color;
      if (score >= 0.7) color = "#16a34a";
      else if (score >= 0.3) color = "#ca8a04";
      else color = "#dc2626";

      ring.style.stroke = color;
      scoreValue.textContent = score.toFixed(1);
      scoreValue.style.color = color;
    }

    function showDetails(data) {
      document.getElementById("detailAction").textContent = data.action || "—";
      document.getElementById("detailSuccess").textContent = data.success
        ? "Yes"
        : "No";
      document.getElementById("detailTs").textContent = data.challenge_ts
        ? new Date(data.challenge_ts).toLocaleString()
        : "—";
      details.classList.remove("hidden");
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove("hidden");
    }

    function setLoading(loading) {
      btn.disabled = loading;
      spinner.classList.toggle("hidden", !loading);
      btn.lastChild.textContent = loading ? " Checking…" : " Refresh Score";
    }

    async function checkScore() {
      errorEl.classList.add("hidden");
      setLoading(true);

      try {
        const token = await grecaptcha.execute(SITE_KEY, {
          action: "score_check",
        });

        const res = await fetch("/api/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || "Verification failed");
          return;
        }

        setScore(data.score);
        showDetails(data);
      } catch (err) {
        showError("Something went wrong — check the console for details");
        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    btn.addEventListener("click", checkScore);

    grecaptcha.ready(checkScore);
  </script>
</body>
</html>
